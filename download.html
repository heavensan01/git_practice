<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<title>Google</title> 
<style> 
body { 
margin: 0; 
font-family: Arial, sans-serif; 
} 
header { 
display: flex; 
justify-content: flex-end; 
padding: 15px; 
} 
header a { 
margin-left: 15px; 
text-decoration: none; 
color: black; 
font-size: 14px; 
} 
main { 
display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 100px; 
        } 
        input[type="text"] { 
            width: 500px; 
            padding: 10px; 
            border-radius: 20px; 
            border: 1px solid #ccc; 
            outline: none; 
        } 
        .buttons { 
            margin-top: 20px; 
        } 
        .buttons button { 
            padding: 8px 15px; 
            margin: 5px; 
            border: none; 
            background-color: #f2f2f2; 
            cursor: pointer; 
        } 
        footer { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background-color: #f2f2f2; 
            padding: 10px; 
            font-size: 14px; 
        } 
.footer-links { 
display: flex; 
justify-content: space-between; 
} 
footer a { 
text-decoration: none; 
color: black; 
margin: 0 10px; 
} 
</style> 
</head> 
<body> 
<header> 
<a href="#">Gmail</a> 
<a href="#">Images</a> 
<a href="#">Sign In</a> 
</header> 
<main> 
<img 
src=https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/500px-Google_2015_logo.svg.png?20160213081640 alt="Google Logo"> 
<br> 
<input type="text" placeholder="Search Google or type a URL"> 
<div class="buttons"> 
<button>Google Search</button> 
<button>I'm Feeling Lucky</button> 
</div> 
</main> 
<footer> 
<p>India</p> 
<div class="footer-links">

</div>

</div> 
</div>
